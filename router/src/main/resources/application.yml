server:
  # NB: not ${ROUTER_PORT} — k8s injects ROUTER_PORT=tcp://… for the router Service.
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: router
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

router:
  rate-limit-per-sec: ${RATE_LIMIT_PER_SEC:50}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics

logging:
  level:
    com.tunnel.router: INFO
