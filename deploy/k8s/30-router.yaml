# Router — stateless sticky session→pod forward (PRD-v2.md §6, §10). Stateless,
# so it scales horizontally. Exposed via NodePort so QA6-like traffic can be
# driven from the host (the entry point of the data plane).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: router
  namespace: tunnel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: router
  template:
    metadata:
      labels:
        app: router
    spec:
      containers:
        - name: router
          image: tunnel/router:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:TieredStopAtLevel=1 -XX:ActiveProcessorCount=2"
            - name: REDIS_HOST
              value: redis
            - name: WEBUI_FALLBACK_URL
              value: "http://webui-placeholder:3000"
          resources:
            requests:
              memory: 140Mi
            limits:
              memory: 280Mi
---
apiVersion: v1
kind: Service
metadata:
  name: router
  namespace: tunnel
spec:
  type: NodePort
  selector:
    app: router
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
