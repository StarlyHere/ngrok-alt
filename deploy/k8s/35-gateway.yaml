# QA6 Gateway / Decision Layer — the front door (:9000). Bifurcates traffic:
# normal QA6 → placeholder; tunnel/debug (X-Tunnel-Session header or remoteDebugConf
# cookie) → normalized + forwarded to the Router (router:8080). Additive: the Router
# is unchanged and stays reachable internally as router:8080.
#
# The Gateway becomes the externally-exposed entry (NodePort 30090); drive traffic
# at it instead of the Router. Stateless, so it scales horizontally.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qa6-gateway
  namespace: tunnel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qa6-gateway
  template:
    metadata:
      labels:
        app: qa6-gateway
    spec:
      containers:
        - name: qa6-gateway
          image: tunnel/qa6-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9000
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:TieredStopAtLevel=1 -XX:ActiveProcessorCount=2"
            - name: REDIS_HOST
              value: redis
            - name: GATEWAY_ROUTER_URL
              value: http://router:8080
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 9000
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 12
          resources:
            requests:
              memory: 256Mi
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: qa6-gateway
  namespace: tunnel
spec:
  type: NodePort
  selector:
    app: qa6-gateway
  ports:
    - port: 9000
      targetPort: 9000
      nodePort: 30090
